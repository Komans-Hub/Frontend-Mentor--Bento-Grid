<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <main class="container" aria-label="Bento grid features">
        <section class="container-1" aria-label="hero">
            <h1>Social Media <span>10x</span> Faster with AI</h1>
            <figure>
                <img src="illustration-five-stars.webp" alt="five stars rating" class="star_image">
                <figcaption>Over 4,000 5-star reviews</figcaption>
            </figure>
        </section>

        <section class="container-2" aria-label="multi-account management">
            <figure>
                <img src="illustration-multiple-platforms.webp" alt="multiple platforms illustration">
                <figcaption>Manage multiple accounts and platforms.</figcaption>
            </figure>
        </section>

        <section class="container-3" aria-label="posting schedule">
            <h3>Maintain a consistent posting schedule.</h3>
            <figure>
                <img src="illustration-consistent-schedule.webp" alt="consistent schedule illustration">
            </figure>
        </section>

        <section class="container-4" aria-label="schedule optimization">
            <h3>Schedule to social media.</h3>
            <figure>
                <img src="illustration-schedule-posts.webp" alt="schedule posts illustration">
                <figcaption>Optimize post timings to publish content at the perfect time for your audience.</figcaption>
            </figure>
        </section>

        <section class="container-5" aria-label="grow followers">
            <figure>
                <img src="illustration-grow-followers.webp" alt="grow followers illustration">
                <figcaption>Grow followers with non-stop content.</figcaption>
            </figure>
        </section>

        <section class="container-6" aria-label="audience growth stats">
            <h3>&gt;56%</h3>
            <p>faster audience growth</p>
            <figure>
                <img src="illustration-audience-growth.webp" alt="audience growth illustration">
            </figure>
        </section>

        <section class="container-7" aria-label="quick content creation">
            <h3>Create and schedule content <span>quicker.</span></h3>
            <figure>
                <img src="illustration-create-post.webp" alt="create post illustration">
            </figure>
        </section>

        <section class="container-8" aria-label="AI content writing">
            <h3>Write your content using AI.</h3>
            <figure>
                <img src="illustration-ai-content.webp" alt="AI content illustration">
            </figure>
        </section>
    </main>
</body>
</html>
